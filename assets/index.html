<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>UNO Q RGB LEDs</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1e293b 0%, transparent 35%),
        radial-gradient(circle at top right, #1d4ed8 0%, transparent 20%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero, .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    .hero p {
      margin: 0;
      line-height: 1.5;
      color: var(--muted);
    }

    .toolbar {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
    }

    button.secondary {
      background: linear-gradient(135deg, #334155, #475569);
    }

    .grid {
      display: grid;
      gap: 18px;
      margin-top: 22px;
    }

    .row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .big-led {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.18);
      margin: 0 auto;
      cursor: pointer;
      opacity: 0.35;
      background: rgb(80, 80, 80);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.12);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .big-led:hover {
      transform: scale(1.03);
    }

    .big-led.on {
      opacity: 1;
      box-shadow:
        0 0 16px currentColor,
        0 0 32px currentColor,
        inset 0 0 18px rgba(255,255,255,0.18);
    }

    .meta h2 {
      margin: 0 0 8px 0;
      font-size: 1.15rem;
    }

    .meta .sub {
      color: var(--muted);
      line-height: 1.5;
    }

    .state-line {
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.16);
      letter-spacing: 0.03em;
    }

    .badge-off {
      background: rgba(71, 85, 105, 0.35);
      color: #cbd5e1;
    }

    .badge-on {
      background: rgba(34, 197, 94, 0.18);
      color: #86efac;
    }

    .badge-nocolor {
      background: rgba(245, 158, 11, 0.18);
      color: #fcd34d;
    }

    .pickers {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pick {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 68px;
    }

    .pick small {
      color: var(--muted);
      font-weight: bold;
    }

    .mini {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.22);
      cursor: pointer;
      opacity: 0.35;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .mini:hover {
      transform: scale(1.06);
    }

    .mini.selected {
      opacity: 1;
      box-shadow: 0 0 12px currentColor;
    }

    .red { background: rgb(255,0,0); color: rgb(255,0,0); }
    .green { background: rgb(0,200,90); color: rgb(0,200,90); }
    .blue { background: rgb(0,120,255); color: rgb(0,120,255); }

    .status {
      margin-top: 18px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .row {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .pickers {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>UNO Q - RGB LEDs MPU / MCU</h1>
      <p>
        Two RGB LEDs are controlled by the MPU and two by the MCU.<br>
        The R, G, and B channels define the color.<br>
        The large circle toggles the LED on or off.
      </p>
      <div class="toolbar">
        <button onclick="allOn()">Turn all on</button>
        <button class="secondary" onclick="allOff()">Turn all off</button>
      </div>
    </section>

    <section class="grid" id="grid"></section>
    <div class="status" id="status">Chargement...</div>
  </div>

  <script>
    let currentState = { leds: {} };

    function ledOrder() {
      return ["led1", "led2", "led3", "led4"];
    }

    function hasAnyChannel(channels) {
      return !!(channels.r || channels.g || channels.b);
    }

    function getLedVisualState(led) {
      if (!led.on) {
        return {
          text: "OFF",
          className: "badge badge-off"
        };
      }

      if (!hasAnyChannel(led.channels)) {
        return {
          text: "ON - NO COLOR",
          className: "badge badge-nocolor"
        };
      }

      return {
        text: "ON",
        className: "badge badge-on"
      };
    }

    function buildUI() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      for (const id of ledOrder()) {
        const row = document.createElement("section");
        row.className = "card row";
        row.innerHTML = `
          <div>
            <div class="big-led" id="main-${id}"></div>
          </div>
          <div class="meta">
            <h2 id="title-${id}"></h2>
            <div class="sub" id="sub-${id}"></div>
            <div class="state-line">
              <span id="state-${id}" class="badge badge-off">OFF</span>
            </div>
          </div>
          <div class="pickers">
            <div class="pick">
              <small>R</small>
              <div class="mini red" id="pick-${id}-r"></div>
            </div>
            <div class="pick">
              <small>G</small>
              <div class="mini green" id="pick-${id}-g"></div>
            </div>
            <div class="pick">
              <small>B</small>
              <div class="mini blue" id="pick-${id}-b"></div>
            </div>
          </div>
        `;
        grid.appendChild(row);

        document.getElementById(`main-${id}`).addEventListener("click", () => toggleLed(id));
        document.getElementById(`pick-${id}-r`).addEventListener("click", () => toggleChannel(id, "r"));
        document.getElementById(`pick-${id}-g`).addEventListener("click", () => toggleChannel(id, "g"));
        document.getElementById(`pick-${id}-b`).addEventListener("click", () => toggleChannel(id, "b"));
      }
    }

    function composeColor(channels, isOn) {
      const baseR = channels.r ? 255 : 80;
      const baseG = channels.g ? 200 : 80;
      const baseB = channels.b ? 255 : 80;

      if (!isOn) {
        const rr = channels.r ? 140 : 80;
        const gg = channels.g ? 120 : 80;
        const bb = channels.b ? 140 : 80;
        return `rgb(${rr}, ${gg}, ${bb})`;
      }

      return `rgb(${baseR}, ${baseG}, ${baseB})`;
    }

    function render() {
      for (const id of ledOrder()) {
        const led = currentState.leds[id];
        if (!led) continue;

        document.getElementById(`title-${id}`).textContent =
          `${led.label} - ${led.side}`;

        const sub = document.getElementById(`sub-${id}`);
        sub.textContent =
          `R:${led.channels.r ? 1 : 0} G:${led.channels.g ? 1 : 0} B:${led.channels.b ? 1 : 0}`;

        const visualState = getLedVisualState(led);
        const stateBadge = document.getElementById(`state-${id}`);
        stateBadge.textContent = visualState.text;
        stateBadge.className = visualState.className;

        const main = document.getElementById(`main-${id}`);
        const color = composeColor(led.channels, led.on);
        main.style.background = color;
        main.style.color = color;
        main.classList.toggle("on", led.on && hasAnyChannel(led.channels));

        for (const ch of ["r", "g", "b"]) {
          const btn = document.getElementById(`pick-${id}-${ch}`);
          btn.classList.toggle("selected", !!led.channels[ch]);
        }
      }

      document.getElementById("status").textContent =
        "State synchronized with Python and MCU.";
    }

    async function callApi(path) {
      const res = await fetch(path, { cache: "no-store" });
      const data = await res.json();
      if (!data.ok) {
        throw new Error(data.error || "api_error");
      }
      return data;
    }

    async function loadState() {
      try {
        currentState = await callApi("/state");
        render();
      } catch (e) {
        document.getElementById("status").textContent = "Erreur chargement : " + e.message;
      }
    }

    async function toggleLed(id) {
      try {
        currentState = await callApi(`/toggle_led?led=${encodeURIComponent(id)}`);
        render();
      } catch (e) {
        document.getElementById("status").textContent = "Erreur toggle led : " + e.message;
      }
    }

    async function toggleChannel(id, ch) {
      try {
        currentState = await callApi(`/toggle_channel?led=${encodeURIComponent(id)}&channel=${encodeURIComponent(ch)}`);
        render();
      } catch (e) {
        document.getElementById("status").textContent = "Erreur toggle channel : " + e.message;
      }
    }

    async function allOn() {
      try {
        currentState = await callApi("/all_on");
        render();
      } catch (e) {
        document.getElementById("status").textContent = "Erreur all_on : " + e.message;
      }
    }

    async function allOff() {
      try {
        currentState = await callApi("/all_off");
        render();
      } catch (e) {
        document.getElementById("status").textContent = "Erreur all_off : " + e.message;
      }
    }

    buildUI();
    loadState();
  </script>
</body>
</html>
